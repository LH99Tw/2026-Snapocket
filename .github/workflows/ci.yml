name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt ruff
      - run: ruff check .

  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Determine source branch tag prefix
        id: branch
        run: |
          MERGE_MSG=$(git log -1 --format=%s)
          if echo "$MERGE_MSG" | grep -q "dev/fe"; then
            echo "prefix=fe" >> $GITHUB_OUTPUT
          elif echo "$MERGE_MSG" | grep -q "dev/be"; then
            echo "prefix=be" >> $GITHUB_OUTPUT
          else
            echo "prefix=main" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            gmlwls/snapocket:latest
            gmlwls/snapocket:main-${{ github.sha }}
            gmlwls/snapocket:${{ steps.branch.outputs.prefix }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
