{% extends "base.html" %}
{% block content %}

<section class="card">
  <h2>Job Queue</h2>

  <form method="get" action="/ops/jobs" style="display:flex; gap:8px; margin-bottom:12px;">
    <select name="status_filter">
      <option value="" {% if not status_filter %}selected{% endif %}>All</option>
      <option value="queued" {% if status_filter == 'queued' %}selected{% endif %}>Queued</option>
      <option value="running" {% if status_filter == 'running' %}selected{% endif %}>Running</option>
      <option value="succeeded" {% if status_filter == 'succeeded' %}selected{% endif %}>Succeeded</option>
      <option value="failed" {% if status_filter == 'failed' %}selected{% endif %}>Failed</option>
      <option value="cancelled" {% if status_filter == 'cancelled' %}selected{% endif %}>Cancelled</option>
    </select>
    <button type="submit">Filter</button>
  </form>

  {% if jobs %}
    <table>
      <thead>
        <tr>
          <th>Job ID</th>
          <th>Status</th>
          <th>Created</th>
          <th>Updated</th>
          <th>Error</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for j in jobs %}
        <tr>
          <td>{{ j.job_id }}</td>
          <td>
            <span class="badge
              {{ 'ok'   if j.status == 'succeeded' else
                 'warn' if j.status in ['queued', 'running'] else
                 'err' }}">
              {{ j.status }}
            </span>
          </td>
          <td>{{ j.created_at }}</td>
          <td>{{ j.updated_at }}</td>
          <td>{{ j.error or '—' }}</td>
          <td>
            <div style="display:flex; gap:6px;">
              <form method="post" action="/ops/jobs/{{ j.job_id }}/cancel" style="margin:0">
                <button type="submit" {% if j.status not in ['queued','running'] %}disabled{% endif %}>Cancel</button>
              </form>
              <form method="post" action="/ops/jobs/{{ j.job_id }}/retry" style="margin:0">
                <button type="submit" {% if j.status not in ['failed','cancelled'] %}disabled{% endif %}>Retry</button>
              </form>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p class="empty">No jobs in queue.</p>
  {% endif %}
</section>

{% endblock %}
