services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: aiops-llama
    restart: unless-stopped
    cpus: "${AI_LLAMA_CPUS:-6.0}"
    ports:
      - "${AI_LLAMA_PORT:-18114}:8080"
    command:
      - -m
      - /models/${AI_LLAMA_MODEL_FILE:-PaddleOCR-VL-1.5-BF16.gguf}
      - --mmproj
      - /models/${AI_LLAMA_MMPROJ_FILE:-mmproj-BF16.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "${AI_LLAMA_CTX_SIZE:-2048}"
      - -t
      - "${AI_LLAMA_THREADS:-8}"
      - -tb
      - "${AI_LLAMA_THREADS_BATCH:-8}"
      - -b
      - "${AI_LLAMA_BATCH_SIZE:-1024}"
      - -ub
      - "${AI_LLAMA_UBATCH_SIZE:-256}"
      - -fa
      - "${AI_LLAMA_FLASH_ATTN:-on}"
      - -ngl
      - "${AI_LLAMA_GPU_LAYERS:-0}"
    volumes:
      - ../model:/models:ro
    networks:
      ai_internal: {}

  aiops-api:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: aiops-api
    restart: unless-stopped
    environment:
      APP_ENV: ${AI_APP_ENV:-container}
      LLM_BASE_URL: ${AI_LLAMACPP_BASE_URL:-http://llama-server:8080}
      LLM_MODEL_PADDLE: ${AI_LLAMACPP_MODEL_PADDLE:-PaddleOCR-VL-1.5-BF16.gguf}
      LLM_MODEL_GLM: ${AI_LLAMACPP_MODEL_GLM:-PaddleOCR-VL-1.5-BF16.gguf}
      LLM_REQUEST_TIMEOUT_S: ${AI_LLAMACPP_REQUEST_TIMEOUT_S:-300}
      LLM_IMAGE_MAX_SIDE_PX: ${AI_LLAMACPP_IMAGE_MAX_SIDE_PX:-1024}
      LLM_MAX_TOKENS: ${AI_LLAMACPP_MAX_TOKENS:-96}
      PLAYGROUND_TIMEOUT_S: ${AI_PLAYGROUND_TIMEOUT_S:-120}
    ports:
      - "${AI_AIOPS_PORT:-18080}:8080"
    depends_on:
      - llama-server
    volumes:
      - ../data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/live', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      ai_internal: {}
      shared_snapocket:
        aliases:
          - aiops-api
          - snapocket-ai

networks:
  ai_internal:
    name: ${AI_AIOPS_INTERNAL_NETWORK:-aiops-net}
  shared_snapocket:
    external: true
    name: ${AI_AIOPS_SHARED_NETWORK:-snapocket-shared-net}
